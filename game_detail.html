<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TW運彩攻略本v3 足球賽事盤口詳情</title>
    <link rel="shortcut icon" href="https://www.favicon.cc/favicon/487/987/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V1GDE5KQZX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-V1GDE5KQZX');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <div class="container-fluid px-3 px-md-5 my-4">
        <button class="btn btn-primary btn-lg back-home-button mb-3" onclick="window.location.href='/'">回到首頁</button>

        <h1 class="text-center my-4">足球賽事盤口詳情</h1>
        
        <div id="game-info" class="my-4 text-center" style="font-size: 1.2rem; font-weight: bold;">
            <p>主場: <span id="home-team" class="text-primary"></span> &nbsp;&nbsp;|&nbsp;&nbsp; 客場: <span id="away-team" class="text-danger"></span></p>
            <p>開賽時間: <span id="game-time"></span></p>
        </div>

        <!-- 導覽列 Tabs -->
        <ul class="nav nav-tabs nav-justified" id="oddsTabs" role="tablist">
            <li class="nav-item">
                <a class="nav-link active font-weight-bold" id="linkage-tab" data-toggle="tab" href="#linkage" role="tab" style="font-size: 1.2rem;">雙盤聯動 (亞盤 + 歐賠)</a>
            </li>
            <li class="nav-item">
                <a class="nav-link font-weight-bold" id="count-tab" data-toggle="tab" href="#count" role="tab" style="font-size: 1.2rem;">大小球盤</a>
            </li>
        </ul>

        <!-- Tabs 內容區 -->
        <div class="tab-content border border-top-0 p-3 mb-5" id="oddsTabsContent">
            
            <!-- 雙盤聯動區塊 -->
            <div class="tab-pane fade show active" id="linkage" role="tabpanel">
                <h3 class="text-center mt-3 mb-4">亞洲盤走勢</h3>
                <div id="asia-chart" style="width: 100%; height: 350px; margin-bottom: 30px;"></div>
                
                <h3 class="text-center mt-3 mb-4">歐洲盤走勢</h3>
                <div id="euro-chart" style="width: 100%; height: 350px; margin-bottom: 40px;"></div>
                
                <div class="row">
                    <div class="col-md-6">
                        <h4 class="text-center">亞洲盤口紀錄</h4>
                        <table class="table table-bordered text-center detail-table">
                            <thead class="thead-dark">
                                <tr>
                                    <th>時間</th>
                                    <th>盤口</th>
                                    <th>主賠率</th>
                                    <th>客賠率</th>
                                </tr>
                            </thead>
                            <tbody id="asia-odds-table"></tbody>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <h4 class="text-center">歐洲盤口紀錄</h4>
                        <table class="table table-bordered text-center detail-table">
                            <thead class="thead-dark">
                                <tr>
                                    <th>時間</th>
                                    <th>主勝</th>
                                    <th>和局</th>
                                    <th>客勝</th>
                                </tr>
                            </thead>
                            <tbody id="euro-odds-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 大小盤區塊 -->
            <div class="tab-pane fade" id="count" role="tabpanel">
                <div id="count-chart" style="width: 100%; height: 400px; margin-bottom: 20px;"></div>
                <table class="table table-bordered text-center detail-table">
                    <thead class="thead-dark">
                        <tr>
                            <th>時間</th>
                            <th>盤口</th>
                            <th>大球</th>
                            <th>小球</th>
                        </tr>
                    </thead>
                    <tbody id="count-odds-table"></tbody>
                </table>
            </div>
            
        </div>
    </div> 
    
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script>
        // ECharts 在隱藏的 tab 中寬度會變成 0，當切換 tab 時需要重新調整大小
        $('a[data-toggle="tab"]').on('shown.bs.tab', function (e) {
            const targetId = $(e.target).attr("href"); 
            if (targetId === '#count') {
                const chart = echarts.getInstanceByDom(document.getElementById('count-chart'));
                if (chart) chart.resize();
            } else if (targetId === '#linkage') {
                const asiaChart = echarts.getInstanceByDom(document.getElementById('asia-chart'));
                if (asiaChart) asiaChart.resize();
                const euroChart = echarts.getInstanceByDom(document.getElementById('euro-chart'));
                if (euroChart) euroChart.resize();
            }
        });
    </script>
</body>
</html>
