<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TW運彩攻略本v3 籃球賽事盤口詳情</title>
    <link rel="shortcut icon" href="https://www.favicon.cc/favicon/487/987/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V1GDE5KQZX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-V1GDE5KQZX');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <div class="container-fluid px-3 px-md-5 my-4">
        <button class="btn btn-primary btn-lg back-home-button mb-3" onclick="window.location.href='/'">回到首頁</button>

        <h1 class="text-center my-4">籃球賽事盤口詳情</h1>
        
        <div id="game-info" class="my-4 text-center" style="font-size: 1.2rem; font-weight: bold;">
            <p>主場: <span id="home-team" class="text-primary"></span> &nbsp;&nbsp;|&nbsp;&nbsp; 客場: <span id="away-team" class="text-danger"></span></p>
            <p>開賽時間: <span id="game-time"></span></p>
        </div>

        <!-- 導覽列 Tabs -->
        <ul class="nav nav-tabs nav-justified" id="oddsTabs" role="tablist">
            <li class="nav-item">
                <a class="nav-link active font-weight-bold" id="give-tab" data-toggle="tab" href="#give" role="tab" style="font-size: 1.2rem;">讓分盤</a>
            </li>
            <li class="nav-item">
                <a class="nav-link font-weight-bold" id="std-tab" data-toggle="tab" href="#std" role="tab" style="font-size: 1.2rem;">標準盤</a>
            </li>
            <li class="nav-item">
                <a class="nav-link font-weight-bold" id="ball-tab" data-toggle="tab" href="#ball" role="tab" style="font-size: 1.2rem;">大小分盤</a>
            </li>
        </ul>

        <!-- Tabs 內容區 -->
        <div class="tab-content border border-top-0 p-3 mb-5" id="oddsTabsContent">
            
            <!-- 讓分盤區塊 -->
            <div class="tab-pane fade show active" id="give" role="tabpanel">
                <div id="give-chart" style="width: 100%; height: 400px; margin-bottom: 20px;"></div>
                <table class="table table-bordered text-center detail-table">
                    <thead class="thead-dark">
                        <tr>
                            <th>時間</th>
                            <th>盤口</th>
                            <th>主賠率</th>
                            <th>客賠率</th>
                        </tr>
                    </thead>
                    <tbody id="give-odds-table"></tbody>
                </table>
            </div>

            <!-- 標準盤區塊 -->
            <div class="tab-pane fade" id="std" role="tabpanel">
                <div id="std-chart" style="width: 100%; height: 400px; margin-bottom: 20px;"></div>
                <table class="table table-bordered text-center detail-table">
                    <thead class="thead-dark">
                        <tr>
                            <th>時間</th>
                            <th>主勝</th>
                            <th>客勝</th>
                        </tr>
                    </thead>
                    <tbody id="std-odds-table"></tbody>
                </table>
            </div>

            <!-- 大小分盤區塊 -->
            <div class="tab-pane fade" id="ball" role="tabpanel">
                <div id="ball-chart" style="width: 100%; height: 400px; margin-bottom: 20px;"></div>
                <table class="table table-bordered text-center detail-table">
                    <thead class="thead-dark">
                        <tr>
                            <th>時間</th>
                            <th>盤口</th>
                            <th>大分</th>
                            <th>小分</th>
                        </tr>
                    </thead>
                    <tbody id="ball-odds-table"></tbody>
                </table>
            </div>
            
        </div>
    </div> 
    
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script>
        // ECharts 在隱藏的 tab 中寬度會變成 0，當切換 tab 時需要重新調整大小
        $('a[data-toggle="tab"]').on('shown.bs.tab', function (e) {
            const targetId = $(e.target).attr("href"); 
            if (targetId === '#std') {
                const chart = echarts.getInstanceByDom(document.getElementById('std-chart'));
                if (chart) chart.resize();
            } else if (targetId === '#ball') {
                const chart = echarts.getInstanceByDom(document.getElementById('ball-chart'));
                if (chart) chart.resize();
            } else if (targetId === '#give') {
                const chart = echarts.getInstanceByDom(document.getElementById('give-chart'));
                if (chart) chart.resize();
            }
        });
    </script>
</body>
</html>
